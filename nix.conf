build-users-group = nixbld
trusted-users = root claude
experimental-features = nix-command flakes
sandbox = false
# Delegate all builds to the host via SSH to prevent container OOM
# max-jobs = 0 forces all builds remote; host nix-daemon handles compilation
max-jobs = 0
builders = ssh-ng://nix-builder@host.docker.internal x86_64-linux,i686-linux /root/.ssh/builder_key 8 4 big-parallel,kvm - -
builders-use-substitutes = true
